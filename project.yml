name: AudiPad
options:
  bundleIdPrefix: net.absum
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: en
  groupSortPosition: top
  generateEmptyDirectories: true
  xcodeVersion: "26.4"

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    ALWAYS_SEARCH_USER_PATHS: NO
    CLANG_ENABLE_OBJC_ARC: YES

targets:
  AudiPad:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: AudiPad
        excludes:
          - Info.plist
    info:
      path: AudiPad/Info.plist
      properties:
        CFBundleDisplayName: AudiPad
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UIRequiresFullScreen: true
        UIStatusBarHidden: true
        UIViewControllerBasedStatusBarAppearance: false
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSLocationWhenInUseUsageDescription: AudiPad uses your location to show your position on the map, follow you during navigation, and warn about nearby speed cameras.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.absum.audipad
        PRODUCT_NAME: AudiPad
        TARGETED_DEVICE_FAMILY: "2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"
        ENABLE_PREVIEWS: YES
