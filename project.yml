name: AudiPad
options:
  bundleIdPrefix: net.absum
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: en
  groupSortPosition: top
  generateEmptyDirectories: true
  xcodeVersion: "26.4"

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    ALWAYS_SEARCH_USER_PATHS: NO
    CLANG_ENABLE_OBJC_ARC: YES

packages:
  SpotifyiOS:
    url: https://github.com/spotify/ios-sdk
    exactVersion: 5.0.1

targets:
  AudiPad:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: AudiPad
        excludes:
          - Info.plist
    dependencies:
      - package: SpotifyiOS
        product: SpotifyiOS
    info:
      path: AudiPad/Info.plist
      properties:
        CFBundleDisplayName: AudiPad
        CFBundleShortVersionString: "0.2.0"
        CFBundleVersion: "3"
        # Declare Finnish + English as supported localizations so
        # MKDirections / MKRoute return instruction text in Finnish on
        # a Finnish-locale iPad (instead of falling back to English).
        # Apple's localization machinery looks at Bundle.preferred-
        # Localizations to pick the language for system text.
        CFBundleLocalizations:
          - en
          - fi
        UIRequiresFullScreen: true
        UIStatusBarHidden: true
        UIViewControllerBasedStatusBarAppearance: false
        # Expose the app's Documents folder in iOS Files app so the
        # user can browse / AirDrop / share dashcam recordings (and
        # any future user-visible exports) without an in-app picker.
        # Folder shows up as "On My iPad → AudiPad" once at least
        # one file exists in Documents/.
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSLocationWhenInUseUsageDescription: AudiPad uses your location to show your position on the map, follow you during navigation, and warn about nearby speed cameras.
        # Camera + microphone: dashcam loop recording. Used only when
        # the user enables the dashcam in Settings; segments live in
        # Documents/dashcam/ on the device.
        NSCameraUsageDescription: AudiPad's dashcam records continuous video of the road ahead while you drive, in case you need to review an incident later.
        NSMicrophoneUsageDescription: AudiPad's dashcam records audio alongside the video so you can hear the context of any incident on playback. Audio is togglable in Settings.
        # Custom URL scheme — Spotify auth callback returns here after the
        # user taps "Authorize" in the Spotify app.
        CFBundleURLTypes:
          - CFBundleURLName: net.absum.audipad.spotify
            CFBundleURLSchemes:
              - audipad
        # Required so iOS lets AudiPad open the Spotify app for the auth
        # handshake (UIApplication.canOpenURL / openURL).
        LSApplicationQueriesSchemes:
          - spotify
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.absum.audipad
        PRODUCT_NAME: AudiPad
        TARGETED_DEVICE_FAMILY: "2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGNING_ALLOWED: YES
        CURRENT_PROJECT_VERSION: "3"
        MARKETING_VERSION: "0.2.0"
        ENABLE_PREVIEWS: YES
